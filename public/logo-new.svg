<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Background for contrast (optional, remove for transparent) -->
  <!-- <rect width="400" height="100" fill="#0f172a"/> -->

  <!-- ICON SECTION (Left) -->
  <g transform="translate(20, 10)">
    <!-- The Claw / Gripper (Left Arm) -->
    <path d="M15 20 L35 20 L40 30 L40 50 L35 60 L15 60" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- The Claw / Gripper (Right Arm) -->
    <path d="M75 20 L55 20 L50 30 L50 50 L55 60 L75 60" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- The "Lab Flask" / Core being held -->
    <path d="M45 25 L45 35 Q45 55 35 65 L55 65 Q45 55 45 35 L45 25 Z" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2"/>
    
    <!-- The "Vibe" (Waveform inside the flask) -->
    <path d="M38 55 Q42 45 45 55 Q48 65 52 55" stroke="#F472B6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- TEXT SECTION (Right) -->
  <text x="100" y="62" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#FFFFFF">
    Vibe<tspan fill="#3B82F6">Lab</tspan>
  </text>
  
  <!-- Subtext/Tagline -->
  <text x="104" y="80" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="1">
    AI RESEARCH AUTOMATION
  </text>
</svg>
